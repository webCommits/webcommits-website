services:
  web:
    build: .
    restart: unless-stopped
    # Coolify's Traefik proxy routes traffic internally — no host port binding needed.
    # Optional: uncomment to pass a custom domain label for Coolify's Traefik proxy
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.webcommits.rule=Host(`www.webcommits.info`)"
    #   - "traefik.http.routers.webcommits.entrypoints=websecure"
    #   - "traefik.http.routers.webcommits.tls.certresolver=letsencrypt"
    depends_on:
      - mailer

  mailer:
    build: ./mailer
    restart: unless-stopped
    environment:
      CONTACT_RECIPIENT: ${CONTACT_RECIPIENT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE}
